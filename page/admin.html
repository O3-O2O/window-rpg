<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style/admin.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    
    <title>admin</title>
</head>
<body>

    <style>



    </style>
    
    <div class="page-wrapper row">
        <div class="sidebar col-md-2">
            
        </div>

        <div class="content col-md-10">
            <div class="row p-4">
                <div class="shadow-md p-4">
                    <h5>Thêm sản phẩm</h5>
                    <form action="" id="product-form">
                        
                        <div>

                            <div class="form-group mt-2">
                                <label for="name">Ảnh</label>
                                <input type="file" class="form-control" id="product_image" name="product_image">
                            </div>
                            <div class="form-group mt-2">
                                <button type="submit" class="btn btn-primary px-4 py-2">Lưu</button>
                                <button type="reset" class="btn btn-grey p-2">Đặt lại</button>
                            </div>

                        </div>
                    </form>
                </div>
                <div class="">
                    <div class="product-table p-4 shadow-md">
                        <h5>Danh sách sản phẩm</h5>
                        <table class="table">
                            <thead>
                                <tr class="text-center">
                                    
                                    <th scope="col">Ảnh sản phẩm</th>
                                    
                                </tr>
                            </thead>
                            <tbody id="product-list">
                                <tr>
                                    <!-- Hiển thị danh sách sản phẩm -->
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="row p-4">
                <div class="shadow-md p-4">
                    <h5>Thêm sản phẩm</h5>
                    <form action="" id="profile-form">
                        
                        <div>

                            <div class="form-group mt-2">
                                <label for="name">Hàng</label>
                                <input type="text" id="profile-product" class="profile-product" placeholder="product...">
                                <input type="file" class="form-control" id="profile_image" name="profile_image">
                            </div>
                            <div class="form-group mt-2">
                                <button onclick="takeUp()" type="button" class="btn btn-primary">Lưu</button>
                                <button type="reset" class="btn btn-grey">Đặt lại</button>
                            </div>

                        </div>
                    </form>
                </div>
                <div class="">
                    <div class="product-table p-4 shadow-md">
                        <h5>Danh sách mua hàng</h5>
                        <table class="table">
                            <thead>
                                <tr class="text-center">
                                    
                                    <th scope="col">Giỏ hàng</th>
                                    
                                </tr>
                            </thead>
                            <tbody id="profile-list">
                                <tr>
                                    <!-- Hiển thị danh sách sản phẩm -->
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <!-- Boostrap -->
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore-compat.js"></script>

    <script src="../script/firebase.js"></script>
    <script src="../script/admin.js"></script>
    <script src="../script/product_profile_saving.js"></script>

    </script>
</body>
</html>
