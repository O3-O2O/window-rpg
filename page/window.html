<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP</title>
    <link rel="stylesheet" href="../style/window.css">
</head>
<body>

    <style>



    </style>
    
    <div id="dropZone" class="window-main">

        <div class="content-choosing">

            <button onclick="changeGame('signIn_signUp', '../Picture/ChatGPT Image 22_40_25 10 thg 1, 2026.png')" class="join-game">

                <div></div>

                <span class="nameGame">Clicking Rpg</span>

            </button>

            <button onclick="windowComputer()" class="join-game">

                <div class="myComputer"></div>

                <span class="nameGame">My computer</span>

            </button>

        </div>

        <div class="shutdown-bar">

            <div class="shutdown-btn">

                <button class="btn-shut">
                    <div></div>
                    <span>start</span>
                </button>

                <div class="func-btn">

                    <div onclick="funcBtn('Shutdown')">Shutdown</div>

                    <div onclick="funcBtn('Restart')">Restart</div>

                </div>

            </div>

            <div id="openingGame" class="openingGame">



            </div>

        </div>

        <div id="comZone" class="myComputerFunction minus" draggable="true">

            <div class="close-exit">

                <span>My computer</span>

                <div class="btn-close-exit">

                    <button onclick="closingPC()">-</button>
                    <button onclick="deletePC()">✕</button>

                </div>

            </div>

            <div class="insInf">

                <div class="bgChanging">

                    <div class="bgFont">

                        <span>Background</span>

                    </div>

                    <div class="bgBtn">

                        <button onclick="bgChangeGradient('linear-gradient(to bottom, #4facfe, #00f2fe)')" style="background: linear-gradient(to bottom, #4facfe, #00f2fe);"></button>
                        <button onclick="bgChangeGradient('linear-gradient(to right, #ff512f, #dd2476)')" style="background: linear-gradient(to right, #ff512f, #dd2476);"></button>
                        <button onclick="bgChangeGradient('linear-gradient(to bottom, #0f2027, #203a43, #2c5364)')" style="background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364);"></button>
                        <button onclick="bgChangeGradient('linear-gradient(to right, #11998e, #38ef7d)')" style="background: linear-gradient(to right, #11998e, #38ef7d);"></button>
                        <button onclick="bgChangeGradient('linear-gradient(to right, #8e2de2, #4a00e0)')" style="background: linear-gradient(to right, #8e2de2, #4a00e0);"></button>
                        <button onclick="bgChangeGradient('radial-gradient(circle, #ffecd2, #fcb69f)')" style="background: radial-gradient(circle, #ffecd2, #fcb69f);"></button>
                        <button onclick="resetBg();">⟲</button>

                    </div>

                </div>

            </div>

        </div>

    </div>
    

    <script src="../script/window.js"></script>
    <script src="../script/window_shut_re.js"></script>

    <script>



    </script>

</body>
</html>
