<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Windows XP Shutdown</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to bottom, #0a246a, #001a4d);
            font-family: Tahoma, sans-serif;
            overflow: hidden;
            color: white;
        }

        .shutdown-box {
            text-align: center;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Logo */
        .logo {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 15px rgba(255,255,255,0.4);
            letter-spacing: 2px;
        }

        .logo span:nth-child(1) { color: #ff3b3b; }
        .logo span:nth-child(2) { color: #00d94f; }
        .logo span:nth-child(3) { color: #2f6bff; }
        .logo span:nth-child(4) { color: #ffcc00; }

        /* Message */
        .message {
            font-size: clamp(18px, 2.5vw, 24px);
            margin-top: 10px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* Dots animation giống XP hơn */
        .dots {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 25px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
            animation: pulse 1.2s infinite;
        }

        .dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes pulse {
            0%   { opacity: 0.2; transform: scale(0.8); }
            50%  { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0.2; transform: scale(0.8); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* Khi chuyển sang đen */
        .black-screen {
            background: black !important;
            transition: background .5s ease;
        }
    </style>
</head>

<body>

    <div class="shutdown-box" id="box">

        <div class="logo">
            <span>W</span>
            <span>i</span>
            <span>n</span>
            <span>dows XP</span>
        </div>

        <div class="message">
            Windows is shutting down...
        </div>

        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

    </div>

    <script src="../script/window_shut_re.js"></script>
</body>
</html>
