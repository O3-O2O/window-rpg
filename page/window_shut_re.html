<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Windows XP progress</title>

        <style>
            body {
                margin: 0;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                background: #0a246a;
                font-family: Tahoma, sans-serif;
                overflow: hidden;
                transition: background 1.5s ease;
            }

            .shutdown-box {
                text-align: center;
                color: white;
                animation: fadeIn 1.5s ease-in-out;
                transition: opacity 1.5s ease;
            }

            .logo {
                font-size: 42px;
                font-weight: bold;
                margin-bottom: 20px;
            }

            .logo span:nth-child(1) { color: #ff0000; }
            .logo span:nth-child(2) { color: #00cc00; }
            .logo span:nth-child(3) { color: #0000ff; }
            .logo span:nth-child(4) { color: #ffcc00; }

            .message {
                font-size: 22px;
                margin-top: 20px;
                letter-spacing: 1px;
            }

            .dots {
                margin-top: 15px;
                font-size: 30px;
                letter-spacing: 8px;
                animation: blink 1.5s infinite;
            }

            @keyframes blink {
                0%   { opacity: 0; }
                50%  { opacity: 1; }
                100% { opacity: 0; }
            }

            @keyframes fadeIn {
                from { opacity: 0; }
                to   { opacity: 1; }
            }

            .black-screen {
                background: black !important;
            }
        </style>
    </head>

    <body>
        <div class="shutdown-box" id="box">
            <div class="logo">
                <span>W</span>
                <span>i</span>
                <span>n</span>
                <span>dows XP</span>
            </div>

            <div class="message">
                
            </div>

            <div class="dots">
                ● ● ●
            </div>
        </div>

        <script src="../script/window_shut_re.js"></script>
    </body>
</html>
