<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rpg store</title>
    <link rel="stylesheet" href="../style/dropdownbar.css">
    <link rel="stylesheet" href="../style/rpg_store.css">
    <link rel="stylesheet" href="../style/cursor.css">
</head>
<body>

    <style>

        

    </style>


    <div class="main-section">

        <nav class="navigator">

            <div class="content-in setting">

                <button onclick="dropDown(this)" class="btn-size">Website information</button>

                <div class="dropdown-wrap">
                    <ul class="size-inside">

                        <li><button onclick="websiteInfo()">Main page</button></li>
                        <li><button onclick="buyingPage()">Rpg store</button></li>

                    </ul>
                </div>

            </div>

            <div class="content-in">

                <button onclick="gamePlay()" class="btn-size">RPG Clicker</button>

            </div>

            <div class="content-in setting">

                <button class="btn-size" onclick="dropDown(this)">Setting</button>

                <div class="dropdown-wrap">
                    <ul class="size-inside">

                        <li><button onclick="accountLog()">Account</button></li>
                        <li><button onclick="discordPage()">Discord</button></li>
                        <li><button onclick="commentPage()">Comment</button></li>
                        <li><button onclick="logOut()">Log out</button></li>

                    </ul>
                </div>
            </div>

        </nav>

        <form class="comment">
            <div class="comment-box">

                <textarea id="textReport" class="inputComment" placeholder="Write your comment here..."></textarea>

                <div class="comment-actions">
                    <button type="button" class="closeComment">Cancel</button>

                    <button type="button" class="submitComment">Submit</button>
                </div>

            </div>
        </form>

        <div class="cartBuy">

            <input class="search-bar" id="search-bar" placeholder="Search...">

            <div id="cart-container" class="cart-container">

            </div>

        </div>

        
        

    </div>

    <div id="custom-cursor"></div>




    <!-- ===== FIREBASE ===== -->
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-firestore-compat.js"></script>
    <script src="../script/firebase.js"></script>

    <!-- ===== USER SESSION ===== -->

    <!-- ===== GAME SCRIPT ===== -->

    <script src="../script/dropdownbar.js"></script>
    <script src="../script/rpg_store.js"></script>
    <script src="../script/cursor.js"></script>
    <script src="../script/out_to_window.js"></script>
    

    <script>



    </script>



</body>
</html>
