<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windows XP Boot</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: black; /* XP boot nền đen */
            height: 100vh;
            font-family: Tahoma, sans-serif;
            color: white;
            overflow: hidden;
            cursor: progress;
        }

        .boot-screen {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Logo */
        .logo {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .logo img {
            width: 50vw;        /* co theo màn hình */
            max-width: 600px;   /* không quá to */
            min-width: 250px;   /* không quá nhỏ */
        }

        /* Please wait */
        .loading-text {
            position: absolute;
            top: 62%;
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(16px, 2vw, 22px);
            letter-spacing: 1px;
            color: #ccc;
        }

        /* Loading bar */
        .loading-bar {
            position: absolute;
            top: 68%;
            left: 50%;
            transform: translateX(-50%);
            width: 30vw;
            max-width: 250px;
            min-width: 180px;
            height: 18px;
            background: #111;
            border: 2px solid #444;
            overflow: hidden;
        }

        .loading {
            height: 100%;
            width: 40px;
            background: linear-gradient(to right, #001aff, #00bfff, #001aff);
            animation: load 1s linear infinite;
        }

        @keyframes load {
            0% {
                transform: translateX(-100%);
            }
            100% {
                transform: translateX(700%);
            }
        }

        /* Footer */
        .footer-left {
            position: absolute;
            bottom: 20px;
            left: 30px;
            font-size: clamp(12px, 1.5vw, 14px);
            color: #aaa;
        }

        .footer-right {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: clamp(16px, 2vw, 20px);
            font-weight: bold;
            color: #aaa;
        }
        

        /* Responsive mobile */
        @media (max-width: 600px) {
            .loading-bar {
                top: 70%;
            }

            .loading-text {
                top: 64%;
            }
        }
    </style>
</head>

<body>
    <div class="boot-screen">

        <div class="logo">
            <img src="../Picture/win_wait-removebg-preview.png" alt="Windows XP Logo">
        </div>

        <div class="loading-text">
            Please wait...
        </div>

        <div class="loading-bar">
            <div class="loading"></div>
        </div>

        <div class="footer-left">
            Copyright © Microsoft Corporation
        </div>

        <div class="footer-right">
            Microsoft
        </div>

    </div>

    <script>

        setInterval(() => {

            window.location.href = "window.html"

        },5000)

        const startup = new Audio("../audio/startup_xp.mp3")

        startup.play()




    </script>
</body>
</html>
